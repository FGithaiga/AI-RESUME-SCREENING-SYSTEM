<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Resume Classifier</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #fff;
        }

        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            padding: 30px;
            border-radius: 15px;
            width: 450px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
            text-align: center;
        }

        h1 {
            margin-bottom: 10px;
            font-size: 24px;
        }

        p {
            font-size: 14px;
            opacity: 0.8;
        }

        textarea {
            width: 100%;
            height: 180px;
            margin-top: 15px;
            padding: 12px;
            border-radius: 10px;
            border: none;
            outline: none;
            resize: none;
            font-size: 14px;
        }

        button {
            margin-top: 15px;
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: #00c6ff;
            background: linear-gradient(to right, #00c6ff, #0072ff);
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
        }

        .result {
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
            color: #ffe082;
        }

        .footer {
            margin-top: 15px;
            font-size: 11px;
            opacity: 0.7;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>📄 AI Resume Classifier</h1>
        <p>Paste a resume and get instant category prediction</p>

        <form method="POST" action="/predict">
            <textarea name="resume" placeholder="Paste resume text here..."></textarea>
            <button type="submit">Predict Category</button>
        </form>

        {% if prediction %}
        <div class="result">
            🎯 Predicted Category: {{ prediction }}
        </div>
        {% endif %}

        <div class="footer">
            Powered by Machine Learning • Flask App
        </div>
    </div>

</body>
</html>
